<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">

    <h2 class="text-center mb-4">Student Dashboard</h2>

    <!-- Statistics Cards -->
    <div class="row g-4 mb-5">

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <span class="badge bg-primary fs-5">500</span>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Present Students</h5>
                    <span class="badge bg-success fs-5">450</span>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Absent Students</h5>
                    <span class="badge bg-danger fs-5">50</span>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Placements</h5>
                    <span class="badge bg-warning text-dark fs-5">120</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Search Box -->
    <div class="mb-4">
        <input type="text"
               class="form-control"
               placeholder="Search Student">
    </div>

    <!-- Student Table -->
    <div class="table-responsive">

        <table class="table table-bordered table-hover table-striped">

            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Attendance</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>101</td>
                    <td>Karthik</td>
                    <td>CSE</td>
                    <td><span class="badge bg-success">95%</span></td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>Harsha</td>
                    <td>ECE</td>
                    <td><span class="badge bg-warning text-dark">85%</span></td>
                </tr>

                <tr>
                    <td>103</td>
                    <td>Rahul</td>
                    <td>EEE</td>
                    <td><span class="badge bg-danger">70%</span></td>
                </tr>

                <tr>
                    <td>104</td>
                    <td>Priya</td>
                    <td>IT</td>
                    <td><span class="badge bg-success">92%</span></td>
                </tr>

                <tr>
                    <td>105</td>
                    <td>Anjali</td>
                    <td>Mechanical</td>
                    <td><span class="badge bg-primary">88%</span></td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
